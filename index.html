<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- Prevent theme flash: set data-theme before React mounts -->
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>백광인 · Frontend Engineer</title>
    <meta name="description" content="요구사항 너머의 맥락을 읽고, 최선의 해결책을 찾아 끝까지 실행하는 프론트엔드 개발자입니다. goorm Inc. Fullstack Engineer." />
    <meta name="author" content="Baik Gwangin" />
    <meta name="keywords" content="frontend engineer, React, TypeScript, Next.js, NestJS, 백광인, 프론트엔드 개발자" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="백광인 · Frontend Engineer" />
    <meta property="og:description" content="요구사항 너머의 맥락을 읽고, 최선의 해결책을 찾아 끝까지 실행하는 프론트엔드 개발자입니다." />
    <meta property="og:image" content="/assets/profile.jpg" />
    <meta property="og:image:alt" content="백광인 프로필 사진" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="ko_KR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="백광인 · Frontend Engineer" />
    <meta name="twitter:description" content="요구사항 너머의 맥락을 읽고, 최선의 해결책을 찾아 끝까지 실행하는 프론트엔드 개발자입니다." />
    <meta name="twitter:image" content="/assets/profile.jpg" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any" />

    <!-- Fonts: Pretendard (Korean dynamic subset — loads only used character ranges) -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/pretendard-dynamic-subset.min.css"
    />

    <!-- Fonts: Tossface (emoji font) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/toss/tossface/dist/tossface.css"
    />

    <!-- LCP image preload -->
    <link rel="preload" as="image" href="/assets/profile.jpg" fetchpriority="high" />

    <!-- mermaid: external from bundle, loaded via CDN to avoid Rolldown chunk reprocessing issues -->
    <script type="importmap">
      {
        "imports": {
          "mermaid": "https://cdn.jsdelivr.net/npm/mermaid@11.15.0/dist/mermaid.esm.min.mjs"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/Main.tsx"></script>
  </body>
</html>
